  # ---- BGM: sparse major-beat music ----
  - id: bgm_review_board_loss
    channel: bgm
    status: approved
    loop: true
    intendedDurationSeconds: 180
    prompt: >-
      Sparse restrained procedural tension for a Japanese evidence-review
      hearing the defense is losing, low sustained strings, occasional muted
      piano pulse, cold institutional air, no melody climax, no percussion,
      ends open, unresolved, and quietly defeated.
    reuseRationale: >-
      Catalog is empty. Serves only the first-round hearing loss in scene_5;
      the final-round victory in scene_10 has its own BGM so the emotional
      arc does not blur.
    evidence:
      - { file: docs/stories_plan/chapter_1/scene_5.md, line: 3, note: 審查會場，空氣冷而安靜，翻一頁紙都太響 }
      - { file: docs/stories_plan/chapter_1/scene_5.md, line: 123, note: 神谷宣布本輪審查暫停，摘要維持原判 }
  - id: bgm_review_board_victory
    channel: bgm
    status: approved
    loop: true
    intendedDurationSeconds: 180
    prompt: >-
      Restrained procedural tension that slowly resolves into earned relief
      for a Japanese evidence-review hearing the defense wins, low sustained
      strings, muted piano pulse building to a single quiet resolved chord,
      cold institutional air giving way to a warmer sustained note, no
      triumphant swell, ends settled but somber.
    reuseRationale: >-
      Catalog is empty. Serves only the final-round hearing in scene_10 where
      Kitami is identified and Miyake is cleared; distinct from the scene_5
      loss BGM so the victory lands.
    evidence:
      - { file: docs/stories_plan/chapter_1/interrogation_scene_10.md, line: 5, note: KAGAMI 證據摘要審查會，長桌、證物推車、旁聽席 }
      - { file: docs/stories_plan/chapter_1/interrogation_scene_10.md, line: 342, note: 神谷撤回三宅主嫌方向，指認北見成立 }
  - id: bgm_chapter_close
    channel: bgm
    status: approved
    loop: true
    intendedDurationSeconds: 150
    prompt: >-
      Bittersweet unresolved chapter-close theme, gentle solo piano over soft
      rain-night pad, a single low string swell, quiet hope mixed with an
      unanswered question, no triumphant resolution, ends on a suspended note.
    reuseRationale: >-
      Catalog is empty. Serves the post-case wind-down and the unexplained
      blue-umbrella hook; no other chapter-1 beat carries this emotional
      shape.
    evidence:
      - { file: docs/stories_plan/chapter_1/scene_11.md, line: 3, note: 雨剛停，店內靜悄悄，淡淡咖啡香 }
      - { file: docs/stories_plan/chapter_1/scene_11.md, line: 145, note: 雨鐘外深夜，店招燈滅，藍傘仍無主人 }

