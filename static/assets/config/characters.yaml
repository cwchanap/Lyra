characters:
  - id: soma_ritsu
    displayNames: ["相馬律"]
    portraitMode: portrait
    visualPrompt: >
      26-year-old Japanese private detective, slim build, slightly disheveled
      dark hair, shirt sleeves rolled to the elbows, quiet orderly posture,
      worn leather case folder nearby, observant but inexperienced.
    referenceAssetId: null
    expressions:
      standard:
        prompt: calm focused expression, restrained concern, eyes attentive

  - id: hayasaka_akane
    displayNames: ["早坂茜"]
    portraitMode: portrait
    visualPrompt: >
      Japanese woman in her early thirties, practical defense attorney, sturdy
      composed build, structured dark jacket over casual clothes, neatly tied
      hair, organized document bag, direct procedural presence.
    referenceAssetId: null
    expressions:
      standard:
        prompt: composed attentive expression, professional calm
      stern:
        prompt: firm serious expression, brows slightly set, controlled voice

  - id: miyake_mother
    displayNames: ["三宅母親"]
    portraitMode: portrait
    visualPrompt: >
      Middle-aged Japanese mother, modest everyday clothes, tired restrained
      face, hands often tense around a convenience-store rice-ball bag,
      quiet dignity, not crying.
    referenceAssetId: null
    expressions:
      standard:
        prompt: quiet restrained expression, worried but holding together
      strained:
        prompt: pained controlled expression, fingers tense, short fragile smile

  - id: clerk
    displayNames: ["書記官"]
    portraitMode: portrait
    visualPrompt: >
      Japanese review-board clerk behind a narrow counter, plain office attire,
      precise bureaucratic posture, neutral face, controlled gatekeeping manner.
    referenceAssetId: null
    expressions:
      standard:
        prompt: neutral procedural expression, professional distance

  - id: takase_manager
    displayNames: ["店長高瀨"]
    portraitMode: portrait
    visualPrompt: >
      Japanese cafe manager in her late thirties to early forties, apron over
      loose casual clothes, tired brow from running a small shop for years,
      practical ordinary presence, one hand habitually wiping a clean counter.
    referenceAssetId: null
    expressions:
      standard:
        prompt: plain practical expression, tired but cooperative
      tired:
        prompt: visibly fatigued expression, shoulders slightly lowered

  - id: katase
    displayNames: ["片瀨"]
    portraitMode: portrait
    visualPrompt: >
      Petite Japanese cafe employee in her early twenties, uniform apron, small
      colorful hair tie and tiny earrings, hurried end-of-shift energy, glancing
      toward the time.
    referenceAssetId: null
    expressions:
      standard:
        prompt: hurried polite expression, slightly anxious about catching train

  - id: miyake_sota
    displayNames: ["三宅蒼太"]
    portraitMode: portrait
    visualPrompt: >
      Young Japanese cafe worker in his early twenties, slim build, slightly
      hunched anxious posture, plain cafe staff shirt under a practical jacket,
      tired eyes from family and work pressure, guarded but not foolish.
    referenceAssetId: null
    expressions:
      standard:
        prompt: nervous restrained expression, looking down slightly, words held back
      strained:
        prompt: tense quiet expression, shoulders lowered, trying not to panic

  - id: kamiya_mio
    displayNames: ["神谷澪"]
    portraitMode: portrait
    visualPrompt: >
      Japanese female prosecutor in her early thirties, dark tailored jacket,
      hair tied back with exacting neatness, composed institutional posture,
      calm precise gaze, restrained pressure without villain exaggeration.
    referenceAssetId: null
    expressions:
      standard:
        prompt: cool precise expression, calm procedural confidence

  - id: kurose_toru
    displayNames: ["黑瀨徹"]
    portraitMode: portrait
    visualPrompt: >
      Japanese police detective nearly fifty, broad sturdy build, weathered
      face with deep eye-corner wrinkles from night shifts, rumpled field coat
      as if slept in a car, muddy worn dress shoes, large steady hands, blunt
      practical presence.
    referenceAssetId: null
    expressions:
      standard:
        prompt: tired watchful expression, blunt field-investigator focus

  - id: kitami_shuichi
    displayNames: ["北見修一"]
    portraitMode: portrait
    visualPrompt: >
      Japanese man in his early forties, medium soft build, forgettable generic
      business-casual outfit, metal-frame glasses slipping slightly, anxious
      overlooked office-worker face, shoulders drawn inward.
    referenceAssetId: null
    expressions:
      standard:
        prompt: guarded anxious expression, trying to stay forgettable

  - id: contractor_supervisor
    displayNames: ["承包商主管"]
    portraitMode: portrait
    visualPrompt: >
      Middle-aged Japanese male contractor records supervisor in a plain gray
      business shirt and understated tie, short neat hair, middle management
      posture, controlled bureaucratic distance, neutral office expression,
      practical and cautious.
    referenceAssetId: null
    expressions:
      standard:
        prompt: neutral guarded expression, procedural reluctance
