bgm:
  bgm_chapter_close:
    prompt:
      Bittersweet unresolved chapter-close theme, gentle solo piano over soft
      rain-night pad, a single low string swell, quiet hope mixed with an
      unanswered question, no triumphant resolution, ends on a suspended note.
    loop: true
  bgm_review_board_loss:
    prompt: Sparse restrained procedural tension for a Japanese evidence-review
      hearing the defense is losing, low sustained strings, occasional muted
      piano pulse, cold institutional air, no melody climax, no percussion, ends
      open, unresolved, and quietly defeated.
    loop: true
  bgm_review_board_victory:
    prompt:
      Restrained procedural tension that slowly resolves into earned relief
      for a Japanese evidence-review hearing the defense wins, low sustained
      strings, muted piano pulse building to a single quiet resolved chord, cold
      institutional air giving way to a warmer sustained note, no triumphant
      swell, ends settled but somber.
    loop: true
