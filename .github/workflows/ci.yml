name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-frontend:
    name: Frontend – check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile scenes
        run: bun run scenes:compile

      - name: Type-check (svelte-check)
        run: bun run check

      - name: Build frontend
        run: bun run build

  lint-rust:
    name: Rust – check & clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/game/src-tauri
            apps/layout-editor/src-tauri

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cargo check game
        run: cargo check --manifest-path apps/game/src-tauri/Cargo.toml

      - name: Cargo check editor
        run: cargo check --manifest-path apps/layout-editor/src-tauri/Cargo.toml

      - name: Clippy game
        run: cargo clippy --manifest-path apps/game/src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Clippy editor
        run: cargo clippy --manifest-path apps/layout-editor/src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

  unit-tests-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run compiler and workspace layout tests
        run: bun run test:scripts

      - name: Run editor Vitest
        run: bun run --cwd apps/layout-editor test

      - name: Run game Vitest with coverage
        run: bun run --cwd apps/game test -- --coverage.enabled

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: apps/game/coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: frontend

  unit-tests-rust:
    name: Rust Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/game/src-tauri
            apps/layout-editor/src-tauri

      - name: Install system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run editor Rust tests
        run: cargo test --manifest-path apps/layout-editor/src-tauri/Cargo.toml

      - name: Generate Rust coverage
        run: cargo llvm-cov --manifest-path apps/game/src-tauri/Cargo.toml --lcov --output-path lcov-rust.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov-rust.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: rust

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compile scenes
        run: bun run scenes:compile

      - name: Build frontend
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bun run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
